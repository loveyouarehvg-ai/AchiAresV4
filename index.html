<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ACHI-ARES KEY SYSTEM</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding-top: 100px; }
        .container { border: 2px solid #ff0000; display: inline-block; padding: 40px; border-radius: 20px; background: #111; box-shadow: 0 0 20px #ff0000; min-width: 320px; }
        h1 { color: #ff0000; text-shadow: 0 0 10px #ff0000; }
        #timer { font-size: 48px; color: #ffcc00; margin: 20px; }
        .key-box { display: none; background: #222; border: 1px dashed #00ff00; padding: 15px; margin: 20px; color: #00ff00; font-family: monospace; font-size: 18px; }
        button { background: #ff0000; color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; }
        button:disabled { background: #444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔑 ACHI-ARES KEY</h1>
        <p>รอ 10 วินาทีเพื่อรับคีย์ (สุ่มพันล้านแบบ)</p>
        <div id="timer">10</div>
        <div id="key-display" class="key-box"></div>
        <button id="btn" disabled onclick="copyKey()">รอสักครู่...</button>
    </div>

    <script>
        // ฟังก์ชั่นสุ่มให้ตรงกับในเกม (อิงตามเวลาไทย GMT+7)
        function getSharedKey() {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const thTime = new Date(utc + (3600000 * 7));
            
            const seed = (thTime.getFullYear() * 1000000) + ((thTime.getMonth() + 1) * 10000) + (thTime.getDate() * 100) + thTime.getHours();
            
            // ปรับแต่งการสุ่มแบบพื้นฐานให้ใกล้เคียง math.random ของ Lua
            function mulberry32(a) {
                return function() {
                  let t = a += 0x6D2B79F5;
                  t = Math.imul(t ^ t >>> 15, t | 1);
                  t ^= t + Math.imul(t ^ t >>> 7, t | 61);
                  return ((t ^ t >>> 14) >>> 0) / 4294967296;
                }
            }
            const rand = mulberry32(seed);
            const randomNum = Math.floor(rand() * (999999999 - 100000000 + 1)) + 100000000;
            return "ACHI-" + randomNum + "-1000D";
        }

        const finalKey = getSharedKey();
        let time = 10;
        const t = document.getElementById('timer');
        const b = document.getElementById('btn');
        const k = document.getElementById('key-display');

        const countdown = setInterval(() => {
            time--;
            t.innerText = time;
            if(time <= 0) {
                clearInterval(countdown);
                t.style.display = 'none';
                k.innerText = finalKey;
                k.style.display = 'block';
                b.disabled = false;
                b.innerText = "คัดลอกคีย์ (COPY)";
            }
        }, 1000);

        function copyKey() {
            navigator.clipboard.writeText(finalKey);
            alert("คัดลอกคีย์แล้ว!");
        }
    </script>
</body>
</html>
